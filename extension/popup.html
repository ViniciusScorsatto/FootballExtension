<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Match Impact</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="lmi-popup-body">
    <main class="lmi-popup">
      <div class="lmi-brand">
        <div class="lmi-brand__mark">
          <img src="assets/footanalysislogo.png" alt="Foot Analysis logo" class="lmi-brand__logo" />
        </div>
        <div class="lmi-brand__copy">
          <div id="popupEyebrow" class="lmi-popup__eyebrow">Foot Analysis</div>
          <div id="popupSubhead" class="lmi-brand__subhead">Live Match Impact</div>
        </div>
      </div>
      <h1 id="popupTitle" class="lmi-popup__title">Track what a goal changes</h1>
      <p id="popupDescription" class="lmi-popup__text">
        Pick a supported league and the overlay will explain the live match impact in seconds.
      </p>

      <section class="lmi-billing-card">
        <div class="lmi-billing-card__header">
          <div>
            <div id="billingEyebrow" class="lmi-popup__eyebrow">Beta Access</div>
            <div id="billingPlanLabel" class="lmi-billing-card__title">Current plan: Free</div>
          </div>
          <div id="billingPlanBadge" class="lmi-plan-badge">Free</div>
        </div>
        <p id="billingSummary" class="lmi-popup__text lmi-popup__text--compact">
          Featured leagues only. Unlock Pro for all supported leagues and premium insights.
        </p>
        <p id="billingOffer" class="lmi-billing-card__offer"></p>
        <div class="lmi-billing-card__actions">
          <button id="billingAction" class="lmi-button lmi-button--primary" type="button">
            Unlock Pro
          </button>
          <button id="billingRefresh" class="lmi-button lmi-button--ghost" type="button">
            Refresh Plan
          </button>
        </div>
      </section>

      <label class="lmi-field">
        <span id="languageLabel" class="lmi-field__label">Language</span>
        <select id="language" class="lmi-field__input">
          <option value="en">English</option>
          <option value="pt-BR">Português (Brasil)</option>
        </select>
      </label>

      <label class="lmi-field">
        <span id="backendUrlLabel" class="lmi-field__label">Backend URL</span>
        <input
          id="backendUrl"
          class="lmi-field__input"
          type="url"
          placeholder="http://localhost:3000"
        />
      </label>

      <button id="refreshMatches" class="lmi-button lmi-button--ghost" type="button">
        Refresh Match List
      </button>

      <label class="lmi-field">
        <span id="leagueFocusLabel" class="lmi-field__label">League Focus</span>
        <select id="leagueFilter" class="lmi-field__input">
          <option value="">All supported leagues</option>
        </select>
      </label>

      <label class="lmi-field">
        <span id="liveMatchesLabel" class="lmi-field__label">Live Matches</span>
        <select id="liveMatches" class="lmi-field__input">
          <option value="">Loading live matches…</option>
        </select>
      </label>

      <label class="lmi-field">
        <span id="upcomingMatchesLabel" class="lmi-field__label">Upcoming Matches</span>
        <select id="upcomingMatches" class="lmi-field__input">
          <option value="">Loading upcoming matches…</option>
        </select>
      </label>

      <label class="lmi-field">
        <span id="manualFixtureLabel" class="lmi-field__label">Manual Fixture ID</span>
        <input
          id="fixtureId"
          class="lmi-field__input"
          type="number"
          min="1"
          placeholder="Optional fallback"
        />
      </label>
      <p id="planHint" class="lmi-popup__hint"></p>

      <button id="startTracking" class="lmi-button lmi-button--primary" type="button">
        Start Tracking
      </button>
      <button id="stopTracking" class="lmi-button lmi-button--ghost" type="button">
        Stop Tracking
      </button>

      <p id="statusMessage" class="lmi-popup__status" aria-live="polite"></p>
    </main>

    <script src="i18n.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
